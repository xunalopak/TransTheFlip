name: Build & Release FAP

# Déclenché sur tout push d'un tag vX.Y.Z
on:
  push:
    tags:
      - 'v*'

# Droits nécessaires pour créer la release et uploader les assets
permissions:
  contents: write

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Job 1 : compilation du FAP Flipper (Linux + ufbt)
  # ════════════════════════════════════════════════════════════════════════
  build-fap:
    name: Build TransTheFlip.fap
    runs-on: ubuntu-latest

    steps:
      # ── 1. Récupérer le code ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python pour ufbt ──────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Cache du SDK Unleashed (évite de le re-télécharger à chaque run) ─
      - name: Cache ufbt SDK
        uses: actions/cache@v4
        with:
          path: ~/.ufbt
          key: ufbt-sdk-unleashed-release-${{ runner.os }}
          restore-keys: |
            ufbt-sdk-unleashed-release-

      # ── 4. Installer ufbt ────────────────────────────────────────────────
      - name: Install ufbt
        run: pip install ufbt

      # ── 5. Télécharger / mettre à jour le SDK Unleashed ──────────────────
      - name: Update Unleashed SDK
        run: ufbt update --channel=release

      # ── 6. Compiler le FAP ───────────────────────────────────────────────
      - name: Build FAP
        run: ufbt build

      # ── 7. Copier avec le nom incluant la version du tag ─────────────────
      - name: Rename FAP with version
        run: |
          FAP=$(find ~/.ufbt/build -name "trans_the_flip.fap" | head -1)
          echo "FAP source: $FAP"
          cp "$FAP" "TransTheFlip-${{ github.ref_name }}.fap"

      # ── 8. Publier le FAP comme artefact pour le job de release ───────────
      - name: Upload FAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: fap
          path: TransTheFlip-${{ github.ref_name }}.fap

  # ════════════════════════════════════════════════════════════════════════
  # Job 2 : compilation des clients PC en exécutables Windows (PyInstaller)
  # ════════════════════════════════════════════════════════════════════════
  build-clients:
    name: Build Windows clients (.exe)
    runs-on: windows-latest

    steps:
      # ── 1. Récupérer le code ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Dépendances clients + PyInstaller ─────────────────────────────
      - name: Install dependencies
        working-directory: pc_client
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      # ── 4. GUI : TransTheFlip-GUI.exe (fenêtré, embarque customtkinter) ──
      - name: Build GUI executable
        working-directory: pc_client
        run: >
          pyinstaller --onefile --windowed
          --name TransTheFlip-GUI
          --collect-all customtkinter
          --collect-all bleak
          trans_gui.py

      # ── 5. CLI : TransTheFlip-CLI.exe (console) ──────────────────────────
      - name: Build CLI executable
        working-directory: pc_client
        run: >
          pyinstaller --onefile --console
          --name TransTheFlip-CLI
          --collect-all bleak
          trans_client.py

      # ── 6. Publier les exes comme artefacts pour le job de release ───────
      - name: Upload client artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clients
          path: pc_client/dist/*.exe

  # ════════════════════════════════════════════════════════════════════════
  # Job 3 : création de la release GitHub avec tous les assets
  # ════════════════════════════════════════════════════════════════════════
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-fap, build-clients]

    steps:
      # ── 1. Récupérer tous les artefacts (FAP + exes) ─────────────────────
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # ── 2. Créer la release et attacher tous les fichiers ────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/TransTheFlip-${{ github.ref_name }}.fap
            artifacts/TransTheFlip-GUI.exe
            artifacts/TransTheFlip-CLI.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
